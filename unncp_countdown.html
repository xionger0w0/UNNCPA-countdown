<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UNNCPA 线上招新倒计时</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
      --sun: #fff176;
      --blue: #0b4a6f;
      --orange: #f28c28;
      --paper: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(920px, 100%);
      padding: clamp(24px, 5vw, 52px);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: clamp(14px, 2vw, 16px);
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0;
    }

    .mark {
      background: linear-gradient(transparent 46%, var(--sun) 46%);
      padding: 0 0.08em;
    }

    .deadline {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.6;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: clamp(24px, 5vw, 40px) 0;
    }

    .unit {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(14px, 3vw, 24px) 8px;
      text-align: center;
      background: #fff;
    }

    .value {
      display: block;
      color: var(--blue);
      font-size: clamp(30px, 7vw, 68px);
      line-height: 1;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .label {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(13px, 2vw, 16px);
    }

    .note {
      margin: 0;
      padding-left: 16px;
      border-left: 4px solid var(--orange);
      color: var(--ink);
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.75;
    }

    @media (max-width: 560px) {
      .timer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main aria-live="polite">
    <p class="eyebrow">UNNCPA Autumn Recruitment</p>
    <h1>距离线上招新<span class="mark">截止</span>还有</h1>
    <p class="deadline">截止时间：2026年9月23日 12:00</p>

    <section class="timer" aria-label="线上招新倒计时">
      <div class="unit">
        <span class="value" id="days">--</span>
        <span class="label">天</span>
      </div>
      <div class="unit">
        <span class="value" id="hours">--</span>
        <span class="label">小时</span>
      </div>
      <div class="unit">
        <span class="value" id="minutes">--</span>
        <span class="label">分钟</span>
      </div>
      <div class="unit">
        <span class="value" id="seconds">--</span>
        <span class="label">秒</span>
      </div>
    </section>

    <p class="note" id="message">如果你还在慢慢了解我们，也没关系。只是在截止前，记得给自己一个尝试的机会。</p>
  </main>

  <script>
    const deadline = new Date("2026-09-23T12:00:00+08:00").getTime();
    const parts = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      message: document.getElementById("message")
    };

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function render() {
      const now = Date.now();
      const remaining = Math.max(0, deadline - now);

      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      parts.days.textContent = days;
      parts.hours.textContent = pad(hours);
      parts.minutes.textContent = pad(minutes);
      parts.seconds.textContent = pad(seconds);

      if (remaining <= 0) {
        parts.message.textContent = "线上招新已截止。感谢你认真了解心协，也期待未来在活动中见到你。";
      }
    }

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
